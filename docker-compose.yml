version: '3.7'
services:
  db:
    build: 
      context: ./MySQL
      dockerfile: Dockerfile
    container_name: payroll_service_container
    restart: always
    ports:
      - 3308:3306
    volumes:
      - ./Config/mysql:/var/lib/mysql
    hostname: apps_database
    networks:
      - payroll_app
    healthcheck:
        test: ["CMD","mysql", "-u", "root", "-pPayRollService123*"]
        interval: 30s
        timeout: 10s
        retries: 5
# --------------------------------------------------------------------
  # - The adminer is a tool for managing content in databases.
  adminer:
    image: adminer
    container_name: adminer_wms
    restart: always
    ports:
      - 8080:8080
    networks:
      - payroll_app
# --------------------------------------------------------------------

networks:
  payroll_app:
      driver: bridge
      name: payroll_app