spring.application.name=payroll-service

# ===============================
# Database Configuration
# ===============================

# MySQL JDBC URL (crea la base de datos si no existe)
#spring.datasource.url=jdbc:mysql://127.0.0.1:3308/db_payroll_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://payroll_db:3306/db_payroll_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=payroll_service_user
spring.datasource.password=PayRollService123*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Mostrar las consultas SQL en los logs
spring.jpa.show-sql=true

# ===============================
# Server Configuration
# ===============================
server.port=8080

# Springdoc Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui


api.user-management.base-url=http://backend-usermanagment:8080