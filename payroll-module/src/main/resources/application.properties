spring.application.name=payroll-service

# ===============================
# Database Configuration
# ===============================

# MySQL JDBC URL (crea la base de datos si no existe)
spring.datasource.url=jdbc:mysql://payroll_db:3306/db_payroll_service?createDatabaseIfNotExist=true
spring.datasource.username=payroll_service_user
spring.datasource.password=PayRollService123*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Mostrar las consultas SQL en los logs
spring.jpa.show-sql=true

# ===============================
# Server Configuration
# ===============================
server.port=8080